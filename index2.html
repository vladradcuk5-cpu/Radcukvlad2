<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Таймер</title>
    <link rel="stylesheet" href="2.css">
</head>
<body>

<h2>Таймер</h2>

<input type="number" id="timeInput" placeholder="Секунди">

<div id="timer">0</div>

<button id="start">Старт</button>
<button id="pause">Пауза</button>
<button id="plus">+10 сек</button>
<button id="minus">-10 сек</button>

<p id="message"></p>

<script src="2.js"></script>
</body>
</html>
